<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EmoSense — Sessions</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050810;
      --surface: #0c1220;
      --surface2: #111827;
      --border: rgba(99, 179, 237, 0.12);
      --border2: rgba(183, 148, 244, 0.12);
      --accent: #63b3ed;
      --accent2: #f6ad55;
      --accent3: #68d391;
      --accent4: #b794f4;
      --red: #fc8181;
      --text: #e2e8f0;
      --muted: #4a5568;
      --sidebar: 220px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif }
    .shell { display: flex; height: 100vh; overflow: hidden }
    .sidebar {
      width: var(--sidebar); flex-shrink: 0; height: 100vh; background: linear-gradient(180deg, #0a0f1a 0%, #080c16 100%);
      border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; position: relative; z-index: 10;
    }
    .sb-logo { padding: 24px 20px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .sb-logo .logo-icon { width: 34px; height: 34px; border-radius: 8px; background: linear-gradient(135deg, rgba(99, 179, 237, 0.2), rgba(183, 148, 244, 0.2)); border: 1px solid rgba(99, 179, 237, 0.3); display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .sb-logo .logo-text { font-size: 15px; font-weight: 800; letter-spacing: 0.08em; color: var(--text) }
    .sb-logo .logo-ver { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); letter-spacing: 0.12em }
    .sb-nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px }
    .nav-section { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.18em; color: var(--muted); padding: 12px 8px 6px; text-transform: uppercase }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 6px; cursor: pointer; transition: all 0.2s; font-size: 13px; font-weight: 600; letter-spacing: 0.02em; color: var(--muted); position: relative; border: 1px solid transparent; text-decoration: none;}
    .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.5; transition: opacity 0.2s }
    .nav-item:hover { background: rgba(255, 255, 255, 0.04); color: var(--text) }
    .nav-item.active { background: rgba(99, 179, 237, 0.08); color: var(--accent); border-color: rgba(99, 179, 237, 0.2); }
    .nav-item.active svg { opacity: 1 }
    
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden }
    .header { padding: 14px 28px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; background: rgba(5, 8, 16, 0.8); backdrop-filter: blur(12px); flex-shrink: 0; }
    .header-title { font-size: 18px; font-weight: 800; letter-spacing: -0.02em }
    .header-title span { color: var(--accent) }
    .header-breadcrumb { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 0.1em }
    .header-spacer { flex: 1 }
    
    .user-chip { display: flex; align-items: center; gap: 8px; padding: 6px 14px 6px 6px; background: rgba(255, 255, 255, 0.04); border: 1px solid var(--border); border-radius: 20px; }
    .user-avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, rgba(99, 179, 237, 0.3), rgba(183, 148, 244, 0.3)); border: 1px solid rgba(99, 179, 237, 0.4); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; letter-spacing: 0.05em; color: var(--accent); }
    .user-name { font-size: 12px; font-weight: 700; letter-spacing: 0.04em }
    
    .dash { flex: 1; overflow-y: auto; padding: 24px; display: grid; gap: 20px; grid-template-columns: 1fr; align-content: start; }
    
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; position: relative; }
    .card-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .card-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }
    .card-title { font-size: 13px; font-weight: 800; letter-spacing: 0.02em }
    .card-body { padding: 20px;}
    
    table { width: 100%; border-collapse: collapse; text-align: left; }
    table th { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; padding: 12px 10px; border-bottom: 1px solid var(--border); letter-spacing: 0.1em; }
    table td { font-size: 14px; padding: 16px 10px; border-bottom: 1px solid rgba(255,255,255,0.02); color: var(--text); }
    table tr:hover td { background: rgba(255,255,255,0.02); }
    
    .emo-chip { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 700; background: rgba(255,255,255,0.05); }
    .e-happy { color: var(--accent3); border: 1px solid rgba(104,211,145,0.2) }
    .e-sad { color: var(--accent); border: 1px solid rgba(99,179,237,0.2) }
    .e-angry { color: var(--red); border: 1px solid rgba(252,129,129,0.2) }
    .e-fear { color: var(--accent4); border: 1px solid rgba(183,148,244,0.2) }
    .e-neutral { color: var(--muted); border: 1px solid rgba(113,128,150,0.2) }
    
    .empty-state { text-align: center; padding: 40px; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.1em; }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="sb-logo">
        <div class="logo-icon">🧠</div>
        <div>
          <div class="logo-text">EmoSense</div>
          <div class="logo-ver">v3.2.1</div>
        </div>
      </div>
      <nav class="sb-nav">
        <div class="nav-section">Main</div>
        <a href="dashboard.html" class="nav-item">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="6" height="6" rx="1" /><rect x="9" y="1" width="6" height="6" rx="1" /><rect x="1" y="9" width="6" height="6" rx="1" /><rect x="9" y="9" width="6" height="6" rx="1" /></svg>
          <span>Dashboard</span>
        </a>
        <a href="analytics.html" class="nav-item">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="1,12 5,7 8,10 11,5 15,8" /></svg>
          <span>Analytics</span>
        </a>
        <div class="nav-section">System</div>
        <a href="sessions.html" class="nav-item active">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="3" width="14" height="10" rx="1.5" /><line x1="1" y1="6" x2="15" y2="6" /><line x1="5" y1="10" x2="9" y2="10" /></svg>
          <span>Sessions</span>
        </a>
      </nav>
    </aside>

    <div class="main">
      <header class="header">
        <div>
          <div class="header-title">Historical <span>Sessions</span></div>
          <div class="header-breadcrumb">EMOSENSE · ACTIVITY</div>
        </div>
        <div class="header-spacer"></div>
        <div class="user-chip">
          <div class="user-avatar" id="user-avatar">?</div>
          <div class="user-name" id="user-name">Loading...</div>
        </div>
      </header>
      
      <div class="dash">
        <div class="card">
          <div class="card-header">
            <div>
              <div class="card-label">DATABASE LOGS</div>
              <div class="card-title">Recent Detections</div>
            </div>
          </div>
          <div class="card-body">
            <table>
              <thead>
                <tr>
                  <th>Session ID</th>
                  <th>Date & Time</th>
                  <th>Duration</th>
                  <th>Dominant Emotion</th>
                </tr>
              </thead>
              <tbody id="sessions-table">
                <tr><td colspan="4"><div class="empty-state">Loading...</div></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    if(!localStorage.getItem("token")) window.location.href="index.html";
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    document.getElementById('user-name').textContent = user.firstName || 'User';
    document.getElementById('user-avatar').textContent = (user.firstName || 'U').charAt(0).toUpperCase();
    // Explicitly point to Flask backend instead of current origin if running on a differing dev port (like 8080)
    let API_BASE = 'http://127.0.0.1:5000';
    if (window.location.origin.includes('5000') || window.location.origin.includes('vercel')) {
      API_BASE = window.location.origin;
    }

    const getChipClass = (emo) => {
        emo = String(emo || '').toLowerCase();
        if (emo.includes('happ') || emo.includes('joy')) return 'e-happy';
        if (emo.includes('sad')) return 'e-sad';
        if (emo.includes('angr')) return 'e-angry';
        if (emo.includes('fear')) return 'e-fear';
        return 'e-neutral';
    };

    function renderState(message) {
      const tbody = document.getElementById('sessions-table');
      tbody.innerHTML = `<tr><td colspan="4"><div class="empty-state">${message}</div></td></tr>`;
    }

    async function loadSessions() {
      try {
        const r = await fetch(`${API_BASE}/api/sessions`, {
          headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
        });

        if (r.status === 401 || r.status === 422) {
          alert("Security token expired or changed! Please log back in.");
          localStorage.removeItem("token");
          window.location.href = "index.html";
          return;
        }

        if (!r.ok) {
          renderState('Unable to load sessions right now.');
          return;
        }

        const payload = await r.json();
        const data = Array.isArray(payload) ? payload : (payload.sessions || []);
        const tbody = document.getElementById('sessions-table');

        if (!data.length) {
          renderState('No sessions recorded yet.');
          return;
        }

        tbody.innerHTML = data.map(s => {
          const created = s.created_at ? new Date(s.created_at) : null;
          const dateText = created && !Number.isNaN(created.getTime()) ? created.toLocaleString() : '-';
          const sid = String(s.id ?? '').padStart(4, '0');
          const duration = s.duration_seconds ?? 0;
          const emotion = s.dominant_emotion || 'Neutral';
          return `
            <tr>
              <td style="font-family:'DM Mono',monospace;color:var(--muted)">#${sid}</td>
              <td>${dateText}</td>
              <td style="font-family:'DM Mono',monospace">${duration}s</td>
              <td><span class="emo-chip ${getChipClass(emotion)}">${emotion}</span></td>
            </tr>
          `;
        }).join('');
      } catch (err) {
        console.error(err);
        renderState('Cannot reach backend API. Start server on port 5000.');
      }
    }

    loadSessions();
  </script>
</body>
</html>
